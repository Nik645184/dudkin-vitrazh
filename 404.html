<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена | Дудкинъ</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0F;
      color: #E8E4DD;
      font-family: 'PT Sans', sans-serif;
      text-align: center;
    }
    .error-page {
      max-width: 560px;
      padding: 2rem;
    }
    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      color: #C9A84C;
      line-height: 1;
      margin: 0;
    }
    .error-page h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      margin: 0.5rem 0 1rem;
    }
    .error-page p {
      font-size: 1.05rem;
      opacity: 0.7;
      margin: 0 0 2rem;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      background: #C9A84C;
      color: #0A0A0F;
      font-family: 'PT Sans', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      border-radius: 4px;
      transition: opacity 0.2s;
    }
    .btn-home:hover { opacity: 0.85; }
    .nav-links {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(201, 168, 76, 0.15);
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.25rem 2rem;
    }
    .nav-links a {
      color: #C9A84C;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1>Страница не найдена</h1>
    <p>Такой страницы нет, но есть много интересного на главной</p>
    <a href="https://dudkin.co/" class="btn-home">На главную</a>
    <nav class="nav-links">
      <a href="https://dudkin.co/vitrazhnye-okna/">Витражные окна</a>
      <a href="https://dudkin.co/vitrazhi-tiffani/">Витражи Тиффани</a>
      <a href="https://dudkin.co/ceny/">Цены</a>
      <a href="https://dudkin.co/portfolio/">Портфолио</a>
    </nav>
  </div>
</body>
</html>
